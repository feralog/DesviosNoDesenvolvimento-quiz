<header>

function shuffleQuestion(q) {
  const correctText = q.options[q.correctIndex];
  const shuffled = [...q.options];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return { ...q, options: shuffled, correctIndex: shuffled.indexOf(correctText) };
}

  for (let i = shuffledQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledQs[i], shuffledQs[j]] = [shuffledQs[j], shuffledQs[i]];
  }
  return shuffledQs.map(shuffleQuestion);
}

let questions = [];
let currentIndex = 0;
let score = 0;
let answered = 0;

function startQuiz() {
  questions = prepareQuestions();
  currentIndex = 0;
  score = 0;
  answered = 0;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  const total = questions.length;

  document.getElementById('progressBar').style.width = ((currentIndex / total) * 100) + '%';
  document.getElementById('progressLabel').textContent = `Questão ${currentIndex + 1} de ${total}`;
  document.getElementById('questionNumber').textContent = `Questão ${currentIndex + 1}`;
  document.getElementById('questionText').textContent = q.question;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').textContent = '';
  document.getElementById('btnNext').classList.remove('show');
}

function selectAnswer(selectedIndex) {
  const q = questions[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');

  buttons.forEach(btn => btn.disabled = true);

  if (selectedIndex === q.correctIndex) {
    buttons[selectedIndex].classList.add('correct');
    score++;
  } else {
    buttons[selectedIndex].classList.add('wrong');
    buttons[q.correctIndex].classList.add('correct');
  }

  answered++;
  const exp = document.getElementById('explanation');
  exp.textContent = q.explanation;
  exp.classList.add('show');

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = currentIndex < questions.length - 1 ? 'Próxima questão →' : 'Ver resultado';
  btnNext.classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('scoreFinal').textContent = score;
  document.getElementById('scoreDenom').textContent = `de ${total}`;
  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = total - score;
  document.getElementById('statPct').textContent = pct + '%';

  let title, msg;
  if (pct >= 90) {
    title = 'Excelente!';
    msg = 'Domínio completo do conteúdo. Você está preparado para a prova.';
  } else if (pct >= 70) {
    title = 'Muito bom!';
    msg = 'Bom domínio geral. Revise os pontos onde errou antes da prova.';
  } else if (pct >= 50) {
    title = 'Razoável';
    msg = 'Ainda há pontos a consolidar. Releia o relatório e refaça o quiz.';
  } else {
    title = 'Precisa revisar';
    msg = 'Recomendo reler o relatório completo antes de tentar novamente.';
  }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz() {
  startQuiz();
}
</script>
